name: Bug report
description: Report a reproducible issue in Valor Theme.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include store passwords, access tokens, private customer data, or API keys.

  - type: input
    id: version
    attributes:
      label: Valor Theme version
      description: "Example: 1.3.6"
      placeholder: "1.3.6"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected area
      options:
        - Home page
        - Product page
        - Collection page
        - Search page
        - Cart drawer
        - Cart page
        - Header or navigation
        - Footer
        - Theme Editor
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the shortest path that triggers the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: "Chrome 126 on Windows, Safari on iPhone, etc."

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, Shopify apps involved, or relevant settings. Remove private data first.
